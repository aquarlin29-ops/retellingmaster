<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Retelling Master</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-markdown@8/react-markdown.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    .animate-fade-in-up { animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .animate-fade-in { animation: fadeIn 0.3s ease-in forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-slate-100 m-0 p-0 overflow-hidden">

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ==========================================
    // ⚠️ 設定區 (上線前必填) ⚠️
    // ==========================================
    // 1. 請將您申請的 Gemini API Key 填入下方引號中 (發布至 GitHub 前必須填寫)
    const apiKey = "AIzaSyAcAiydE76rUxrOoUCA4qu0HUSvaq-QxtI"; 
    
    // 2. 請將您的 Google Apps Script 網址填入下方引號中
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwbBjHh9h3eQMwjHxcUKOw-jjo1NMywZmebz-Z5EMWD_DlpAiO3QDTj2zXNudygVZ_0/exec";

    // 單元資料與關鍵字設定
    const topics = [
      {
        id: 1, title: "1. UK vs. US English",
        hints: ["First of all, the lecture discusses...", "For example, in British English...", "Another key difference is...", "Furthermore..."],
        keywords: ["british", "american", "vocabulary", "pavement", "sidewalk", "spelling", "organize", "recognize", "color", "humor"]
      },
      {
        id: 2, title: "2. History of Social Networks",
        hints: ["According to the talk...", "Initially, in 2004...", "Subsequently, after a few years...", "Most recently..."],
        keywords: ["facebook", "2004", "twitter", "2006", "instagram", "photo", "snapchat", "messaging", "tiktok", "younger"]
      },
      {
        id: 3, title: "3. Types of Yoga",
        hints: ["The main topic is...", "To begin with, Hatha yoga...", "In contrast, Ashtanga...", "Finally..."],
        keywords: ["hatha", "simple", "ashtanga", "challenging", "breathing", "vinyasa", "strength", "flow", "bikram", "hot"]
      },
      {
        id: 4, title: "4. International Students in the UK",
        hints: ["The lecture illustrates...", "A significant number of students come from...", "In terms of EU countries...", "To sum up..."],
        keywords: ["international", "overseas", "china", "india", "7%", "italy", "france", "germany", "spain", "eu"]
      },
      {
        id: 5, title: "5. Selling Second-hand Clothes",
        hints: ["The speaker provides tips on...", "First, it is crucial to...", "Following this...", "Finally, ensure that..."],
        keywords: ["invest", "camera", "lighting", "description", "condition", "measurements", "material", "securely", "packaged", "dispatch"]
      }
    ];

    function App() {
      const [step, setStep] = useState(1);
      const [studentInfo, setStudentInfo] = useState({ className: "", studentNumber: "", studentName: "" });
      const [selectedTopic, setSelectedTopic] = useState(0);
      const [showHints, setShowHints] = useState(false);
      
      const [isRecording, setIsRecording] = useState(false);
      const [transcript, setTranscript] = useState("");
      const [feedbackResult, setFeedbackResult] = useState(null);
      const [isSubmitting, setIsSubmitting] = useState(false);
      
      const recognitionRef = useRef(null);
      const startTimeRef = useRef(null);
      const totalDurationRef = useRef(0);

      useEffect(() => {
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
          const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
          const recognition = new SpeechRecognition();
          recognition.continuous = true;
          recognition.interimResults = true;
          recognition.lang = 'en-US';

          recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
              if (event.results[i].isFinal) {
                finalTranscript += event.results[i][0].transcript + ' ';
              }
            }
            if (finalTranscript) {
              setTranscript((prev) => prev + finalTranscript);
            }
          };

          recognition.onerror = (event) => {
            console.error("Speech recognition error", event.error);
            setIsRecording(false);
          };

          recognition.onend = () => {
            setIsRecording(false);
            if (startTimeRef.current) {
              totalDurationRef.current += (Date.now() - startTimeRef.current) / 1000;
              startTimeRef.current = null;
            }
          };

          recognitionRef.current = recognition;
        } else {
          alert("抱歉，您的瀏覽器不支援語音辨識功能，請使用 Chrome 或 Safari 瀏覽器。");
        }
      }, []);

      const handleInfoChange = (e) => {
        const { name, value } = e.target;
        setStudentInfo(prev => ({ ...prev, [name]: value }));
      };

      const startLogin = () => {
        if (!studentInfo.className || !studentInfo.studentNumber || !studentInfo.studentName) {
          alert("請填寫完整的班級、座號與姓名！");
          return;
        }
        setStep(2);
      };

      const toggleRecording = () => {
        if (!recognitionRef.current) return;

        if (isRecording) {
          recognitionRef.current.stop();
        } else {
          setTranscript("");
          setFeedbackResult(null);
          totalDurationRef.current = 0;
          startTimeRef.current = Date.now();
          recognitionRef.current.start();
          setIsRecording(true);
        }
      };

      // 呼叫 Gemini AI 進行進階評分
      const evaluateTranscript = async () => {
        if (!transcript.trim()) {
          alert("沒有偵測到您的聲音，請再試一次！");
          return;
        }

        setIsSubmitting(true);

        const topic = topics[selectedTopic];
        
        // 1. 計算流暢度 (WPM)
        const words = transcript.trim().split(/\s+/).filter(w => w.length > 0);
        const durationInMinutes = (totalDurationRef.current || 1) / 60;
        const wpm = Math.round(words.length / durationInMinutes);
        
        // 假設高中生合理語速目標為 110 WPM
        let fluencyScore = Math.min(100, Math.round((wpm / 110) * 100));
        if (fluencyScore < 20) fluencyScore = 20;

        // 2. 準備給 AI 的提示詞 (Prompt)
        const promptText = `
          You are an encouraging English teacher evaluating a high school student's retelling of a lecture.
          Topic: ${topic.title}
          Target Keywords: ${topic.keywords.join(', ')}
          Student's Transcript: "${transcript}"

          Evaluate the transcript and strictly return ONLY a JSON object with this exact structure:
          {
            "contentScore": <number 0-100 based on keyword coverage and topic relevance>,
            "grammarScore": <number 0-100 based on grammatical correctness and vocabulary usage>,
            "hitKeywords": [<list of target keywords the student successfully mentioned>],
            "missedKeywords": [<list of target keywords the student missed>],
            "teacherNote": "<A short, encouraging paragraph in Traditional Chinese mixed with English, max 50 words>",
            "grammarCorrections": [<list of strings detailing specific grammar/vocabulary corrections in Traditional Chinese. If perfect, leave empty>]
          }
        `;

        try {
          // 【改回使用】最相容且同時支援預覽環境與正式金鑰的模型
          const modelName = "gemini-2.5-flash-preview-09-2025";
          
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{ parts: [{ text: promptText }] }],
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          if (!response.ok) {
            const errData = await response.json().catch(() => ({}));
            throw new Error(errData.error?.message || response.statusText);
          }
          
          const data = await response.json();
          let aiText = data.candidates[0].content.parts[0].text;
          
          // 清除 AI 可能夾帶的 Markdown 標籤
          let cleanedText = aiText.replace(/```json/gi, '').replace(/```/gi, '').trim();
          const aiResult = JSON.parse(cleanedText);
          const totalScore = Math.round((aiResult.contentScore + aiResult.grammarScore + fluencyScore) / 3);

          const finalFeedback = {
            ...aiResult,
            fluencyScore,
            wpm,
            totalScore
          };

          setFeedbackResult(finalFeedback);

          // 3. 傳送詳細成績到 Google Sheets
          if (GAS_URL.startsWith("http")) {
            fetch(GAS_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({
                className: studentInfo.className,
                studentNumber: studentInfo.studentNumber,
                studentName: studentInfo.studentName,
                topicName: topic.title,
                transcript: transcript,
                wpm: wpm,
                contentScore: aiResult.contentScore,
                grammarScore: aiResult.grammarScore,
                fluencyScore: fluencyScore,
                grammarCorrection: aiResult.grammarCorrections ? aiResult.grammarCorrections.join("\n") : "",
                teachersNotes: aiResult.teacherNote || "",
                totalScore: totalScore
              })
            }).catch(e => console.error("Sheets 寫入失敗", e));
          }

        } catch (error) {
          console.error("AI 評分發生錯誤:", error);
          let errorMsg = error.message;
          if (errorMsg.includes("unregistered callers") || errorMsg.includes("API_KEY_INVALID")) {
            errorMsg = "未偵測到有效的 API 金鑰。如果您已發布至 GitHub，請確認程式碼第 38 行已正確填入您的金鑰。";
          }
          alert(`AI 評分發生錯誤：\n${errorMsg}`);
        }

        setIsSubmitting(false);
        setStep(3);
      };

      const restart = () => {
        setTranscript("");
        setFeedbackResult(null);
        setShowHints(false);
        totalDurationRef.current = 0;
        setStep(2);
      };

      // 圓形進度條元件
      const CircularProgress = ({ score, size = "large" }) => {
        const radius = size === "large" ? 58 : 22;
        const stroke = size === "large" ? 8 : 4;
        const cx = size === "large" ? 64 : 26;
        const circumference = radius * 2 * Math.PI;
        const offset = circumference - (score / 100) * circumference;
        const colorClass = score >= 80 ? 'text-emerald-400' : score >= 60 ? 'text-amber-400' : 'text-rose-400';

        return (
          <div className={`relative inline-flex items-center justify-center ${size === "large" ? 'w-32 h-32' : 'w-[52px] h-[52px]'}`}>
            <svg className="w-full h-full transform -rotate-90">
              <circle cx={cx} cy={cx} r={radius} stroke="currentColor" strokeWidth={stroke} fill="transparent" className="text-slate-100" />
              <circle cx={cx} cy={cx} r={radius} stroke="currentColor" strokeWidth={stroke} fill="transparent" 
                strokeDasharray={circumference} strokeDashoffset={offset} className={`${colorClass} transition-all duration-1000 ease-out`} />
            </svg>
            <div className="absolute flex flex-col items-center">
              <span className={`${size === "large" ? 'text-4xl' : 'text-sm'} font-black text-slate-800`}>{score}</span>
            </div>
          </div>
        );
      };

      return (
        <div className="font-sans flex justify-center items-center bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 min-h-[100dvh]">
          <div className="w-full max-w-md bg-white flex flex-col h-[100dvh] relative overflow-hidden sm:h-[85vh] sm:max-h-[850px] sm:rounded-[2rem] sm:shadow-2xl">
            
            <header className="flex-none pt-8 pb-4 px-6 text-center z-10 border-b border-slate-100 shadow-sm relative bg-white">
              <div className="inline-block bg-gradient-to-r from-indigo-500 to-purple-600 text-transparent bg-clip-text">
                <h1 className="text-2xl font-extrabold tracking-tight">Retelling Master</h1>
              </div>
              <p className="text-slate-500 text-xs mt-1 font-medium">🎧 Listening & Retelling 🗣️</p>
            </header>

            {/* === Step 1: Login === */}
            {step === 1 && (
              <main className="flex-1 overflow-y-auto px-6 py-8 custom-scrollbar bg-white">
                <div className="space-y-6 animate-fade-in-up">
                  <div className="text-center mb-8">
                    <div className="w-20 h-20 bg-indigo-50 text-indigo-500 rounded-full flex items-center justify-center mx-auto mb-4 shadow-inner">
                      <svg className="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"></path></svg>
                    </div>
                    <h2 className="text-xl font-bold text-slate-800">Welcome!</h2>
                    <p className="text-slate-500 text-sm mt-1">請輸入資料準備開始挑戰</p>
                  </div>
                  
                  <div className="space-y-5">
                    <div className="relative">
                      <span className="absolute left-4 top-3.5 text-slate-400">🏫</span>
                      <input type="text" name="className" value={studentInfo.className} onChange={handleInfoChange} className="w-full py-3.5 pl-12 pr-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 font-medium placeholder-slate-400 transition-all shadow-sm" placeholder="班級 (Class) e.g. 308" />
                    </div>
                    <div className="relative">
                      <span className="absolute left-4 top-3.5 text-slate-400">🔢</span>
                      <input type="number" name="studentNumber" value={studentInfo.studentNumber} onChange={handleInfoChange} className="w-full py-3.5 pl-12 pr-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 font-medium placeholder-slate-400 transition-all shadow-sm" placeholder="座號 (No.) e.g. 15" />
                    </div>
                    <div className="relative">
                      <span className="absolute left-4 top-3.5 text-slate-400">👤</span>
                      <input type="text" name="studentName" value={studentInfo.studentName} onChange={handleInfoChange} className="w-full py-3.5 pl-12 pr-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-2 focus:ring-purple-400 outline-none text-slate-700 font-medium placeholder-slate-400 transition-all shadow-sm" placeholder="姓名 (Name)" />
                    </div>
                  </div>

                  <button onClick={startLogin} className="w-full mt-8 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 px-4 rounded-2xl transition-all shadow-lg active:scale-[0.98] flex justify-center items-center gap-2">
                    進入挑戰 🚀
                  </button>
                </div>
              </main>
            )}

            {/* === Step 2: Practice === */}
            {step === 2 && (
              <main className="flex-1 flex flex-col bg-slate-50 overflow-hidden animate-fade-in">
                
                <div className="flex-1 overflow-y-auto p-4 custom-scrollbar flex flex-col gap-4">
                  
                  <div className="bg-white border border-slate-200 p-3 rounded-2xl flex justify-between items-center shadow-sm shrink-0">
                    <div className="flex items-center gap-2">
                      <div className="w-8 h-8 bg-gradient-to-br from-indigo-400 to-purple-400 rounded-full flex items-center justify-center text-white text-xs font-bold">
                        {studentInfo.studentName.charAt(0) || "U"}
                      </div>
                      <span className="text-sm font-bold text-slate-700">
                        {studentInfo.className} - {studentInfo.studentName}
                      </span>
                    </div>
                    <button onClick={() => setStep(1)} className="text-xs text-indigo-500 font-medium hover:text-indigo-700">切換帳號</button>
                  </div>

                  <div className="space-y-1.5 shrink-0">
                    <label className="block text-xs font-bold text-slate-500 pl-1 uppercase tracking-wider">Target Topic</label>
                    <div className="relative">
                      <select 
                        value={selectedTopic} 
                        onChange={(e) => setSelectedTopic(Number(e.target.value))}
                        className="w-full appearance-none py-3 px-4 bg-indigo-50/50 border border-indigo-100 rounded-xl text-indigo-900 text-sm font-bold focus:ring-2 focus:ring-indigo-400 outline-none transition-all cursor-pointer shadow-sm"
                      >
                        {topics.map((topic, index) => (
                          <option key={topic.id} value={index}>{topic.title}</option>
                        ))}
                      </select>
                      <div className="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-indigo-500">
                        <svg className="fill-current h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                      </div>
                    </div>
                  </div>

                  <div className="bg-amber-50 border border-amber-200 rounded-xl overflow-hidden shadow-sm transition-all duration-300 shrink-0">
                    <button 
                      onClick={() => setShowHints(!showHints)}
                      className="w-full py-3 px-4 flex justify-between items-center text-amber-900 font-bold hover:bg-amber-100 transition-colors"
                    >
                      <span className="flex items-center gap-2 text-sm">💡 語言提示 (Language Hints)</span>
                      <span className={`transform transition-transform text-xs ${showHints ? 'rotate-180' : ''}`}>▼</span>
                    </button>
                    
                    {showHints && (
                      <div className="p-3.5 bg-white text-xs text-slate-700 border-t border-amber-100 animate-fade-in">
                        <p className="font-bold text-amber-600 mb-2">建議的開場與轉承詞：</p>
                        <ul className="space-y-1.5">
                          {topics[selectedTopic].hints.map((hint, i) => (
                            <li key={i} className="flex items-start gap-1.5">
                              <span className="text-amber-500 mt-0.5">•</span>
                              <span className="font-medium">{hint}</span>
                            </li>
                          ))}
                        </ul>
                      </div>
                    )}
                  </div>

                  <div className="flex-1 min-h-[140px] relative bg-white rounded-xl shadow-sm border border-slate-200 p-4 shrink-0">
                    {transcript ? (
                      <p className="leading-relaxed font-medium text-slate-700 text-sm h-full">
                        {transcript}
                      </p>
                    ) : (
                      <div className="absolute inset-0 flex flex-col items-center justify-center text-slate-400 opacity-60">
                        <svg className="w-10 h-10 mb-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        <p className="font-medium text-center px-4 text-sm">
                          {isRecording ? "Listening... (請開始說話)" : "按下下方麥克風，看著筆記開始重述"}
                        </p>
                      </div>
                    )}
                  </div>
                </div>

                <div className="flex-none bg-white p-4 border-t border-slate-200 pb-safe z-10 shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                  <div className="flex flex-col items-center">
                    <div className="relative">
                      {isRecording && (
                        <>
                          <div className="absolute inset-0 bg-rose-400 rounded-full animate-ping opacity-75"></div>
                          <div className="absolute inset-[-8px] bg-rose-200 rounded-full animate-pulse opacity-50"></div>
                        </>
                      )}
                      <button 
                        onClick={toggleRecording}
                        className={`relative z-10 w-16 h-16 rounded-full flex justify-center items-center text-white shadow-lg transition-all duration-300 ${
                          isRecording 
                            ? 'bg-rose-500 scale-105 hover:bg-rose-600' 
                            : 'bg-gradient-to-r from-indigo-600 to-purple-600 hover:scale-105'
                        }`}
                      >
                        {isRecording ? (
                          <div className="w-5 h-5 bg-white rounded-sm"></div>
                        ) : (
                          <svg className="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        )}
                      </button>
                    </div>
                    
                    {!isRecording && !transcript && (
                       <p className="text-xs mt-3 font-bold text-slate-500">Tap to Speak</p>
                    )}
                  </div>

                  {transcript && !isRecording && (
                    <button 
                      onClick={evaluateTranscript}
                      disabled={isSubmitting}
                      className="w-full mt-4 bg-slate-800 hover:bg-slate-900 text-white font-bold py-3.5 rounded-xl transition-all shadow-md active:scale-[0.98] disabled:opacity-50 flex justify-center items-center gap-2 text-sm"
                    >
                      {isSubmitting ? (
                        <>
                          <svg className="animate-spin -ml-1 mr-2 h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                          AI 分析評分中...
                        </>
                      ) : (
                        <>送出評分 Submit <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7"></path></svg></>
                      )}
                    </button>
                  )}
                </div>
              </main>
            )}

            {/* === Step 3: Result (Advanced AI Metrics) === */}
            {step === 3 && feedbackResult && (
              <main className="flex-1 overflow-y-auto px-5 py-6 custom-scrollbar bg-slate-50">
                <div className="space-y-6 animate-fade-in-up">
                  
                  {/* Total Score */}
                  <div className="text-center relative pt-2">
                    {feedbackResult.totalScore >= 80 && <div className="absolute inset-0 flex justify-center items-center text-6xl animate-bounce pointer-events-none opacity-20">🏆</div>}
                    <h2 className="text-sm font-bold text-slate-500 mb-3 uppercase tracking-wider">Overall AI Score</h2>
                    <CircularProgress score={feedbackResult.totalScore} size="large" />
                  </div>

                  {/* 3 Metrics Breakdown */}
                  <div className="bg-white rounded-2xl p-4 shadow-sm border border-slate-100 flex justify-between items-center px-6">
                    <div className="flex flex-col items-center">
                      <CircularProgress score={feedbackResult.contentScore} size="small" />
                      <span className="text-[10px] font-bold text-slate-500 mt-2 uppercase">Content</span>
                    </div>
                    <div className="flex flex-col items-center">
                      <CircularProgress score={feedbackResult.grammarScore} size="small" />
                      <span className="text-[10px] font-bold text-slate-500 mt-2 uppercase">Grammar</span>
                    </div>
                    <div className="flex flex-col items-center">
                      <CircularProgress score={feedbackResult.fluencyScore} size="small" />
                      <span className="text-[10px] font-bold text-slate-500 mt-2 uppercase">Fluency ({feedbackResult.wpm}wpm)</span>
                    </div>
                  </div>

                  {/* Hit/Missed Keywords */}
                  <div className="grid grid-cols-2 gap-3">
                    <div className="bg-emerald-50 border border-emerald-100 rounded-xl p-3 shadow-sm">
                      <h3 className="text-[10px] font-bold text-emerald-800 uppercase mb-2 flex items-center gap-1">✓ Mentioned</h3>
                      <div className="flex flex-wrap gap-1">
                        {feedbackResult.hitKeywords.length > 0 ? (
                          feedbackResult.hitKeywords.map((kw, i) => <span key={i} className="px-1.5 py-0.5 bg-white text-emerald-700 text-[10px] font-bold rounded shadow-sm">{kw}</span>)
                        ) : (<span className="text-[10px] text-emerald-600/70">None</span>)}
                      </div>
                    </div>
                    <div className="bg-rose-50 border border-rose-100 rounded-xl p-3 shadow-sm">
                      <h3 className="text-[10px] font-bold text-rose-800 uppercase mb-2 flex items-center gap-1">⚠ Missed</h3>
                      <div className="flex flex-wrap gap-1">
                        {feedbackResult.missedKeywords.length > 0 ? (
                          feedbackResult.missedKeywords.map((kw, i) => <span key={i} className="px-1.5 py-0.5 bg-white text-rose-600 text-[10px] font-bold rounded shadow-sm">{kw}</span>)
                        ) : (<span className="text-[10px] text-rose-600/70">Perfect!</span>)}
                      </div>
                    </div>
                  </div>

                  {/* Grammar Corrections */}
                  {feedbackResult.grammarCorrections && feedbackResult.grammarCorrections.length > 0 && (
                    <div className="bg-orange-50 border border-orange-100 p-4 rounded-xl shadow-sm">
                      <h3 className="text-xs font-bold text-orange-800 uppercase tracking-wider mb-2 flex items-center gap-1">
                        <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                        文法建議 (Grammar Correction)
                      </h3>
                      <ul className="list-disc pl-5 space-y-1">
                        {feedbackResult.grammarCorrections.map((correction, i) => (
                          <li key={i} className="text-sm text-orange-900 font-medium">{correction}</li>
                        ))}
                      </ul>
                    </div>
                  )}

                  {/* Teacher's Note */}
                  <div className="bg-indigo-50 border border-indigo-100 p-4 rounded-xl shadow-sm">
                    <h3 className="text-xs font-bold text-indigo-800 uppercase tracking-wider mb-2">Teacher's Note</h3>
                    <p className="text-sm text-indigo-900 font-medium leading-relaxed">{feedbackResult.teacherNote}</p>
                  </div>

                  <button onClick={restart} className="w-full bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 font-bold py-3.5 rounded-xl transition-all active:scale-[0.98] shadow-sm text-sm">
                    再練習一次 Try Again
                  </button>
                  <div className="h-4"></div> {/* Bottom spacer */}
                </div>
              </main>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
